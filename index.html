  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ily: 'Montserrat';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"10bb2155-9355-45bc-b178-8a36785edadb\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"791d9428-ed55-4bc5-9125-246a20ca3181\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"eb5b57a1-1fe6-453d-908c-6dd2d771bc31\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact;}\n  html,body{margin:0;background:#EBEEF2;font-family:'Montserrat',sans-serif;-webkit-font-smoothing:antialiased;color:#1F2D3D;}\n  button{font-family:inherit;cursor:pointer;}\n  input,textarea,select{font-family:inherit;}\n  ::-webkit-scrollbar{height:10px;width:10px;}\n  ::-webkit-scrollbar-thumb{background:#C2CCD6;border-radius:6px;}\n  @page{size:A4;margin:0;}\n  @media print{\n    body{background:#fff;}\n    body *{visibility:hidden !important;}\n    #print-area,#print-area *{visibility:visible !important;}\n    #print-area{position:absolute !important;left:0 !important;top:0 !important;width:100% !important;}\n    .print-sheet{box-shadow:none !important;border:none !important;margin:0 !important;break-after:page;}\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<!-- ===== ONBOARDING (consultant self-assessment) ===== -->\n<sc-if value=\"{{ isOnboard }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"min-height:100vh;background:#EBEEF2;\">\n  <div style=\"background:#0B1829;padding:15px 26px;display:flex;align-items:center;gap:16px;\">\n    <img src=\"8e461c65-0a45-43b2-b242-6663b05468ec\" alt=\"CXaiS\" style=\"height:28px;width:auto;display:block;\">\n    <div style=\"width:1px;height:24px;background:rgba(255,255,255,.16);\"><\u002Fdiv>\n    <div style=\"font-size:13.5px;font-weight:600;color:#fff;\">Bench self-assessment<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"max-width:740px;margin:0 auto;padding:26px 22px 80px;\">\n\n    <sc-if value=\"{{ ob.form }}\" hint-placeholder-val=\"{{ true }}\">\n    <div>\n      <div style=\"font-size:25px;font-weight:300;color:#0B1829;letter-spacing:-.01em;\">Join the CXaiS bench<\u002Fdiv>\n      <p style=\"font-size:13px;line-height:1.6;color:#5B6B7A;margin:8px 0 0;\">Tell us about your experience and rate yourself honestly against the role's skills. This is your starting point — we'll confirm it together in a short 1-2-1 review before it goes live.<\u002Fp>\n\n      <div style=\"background:#fff;border:1px solid #E3E9EF;border-radius:14px;padding:22px;margin-top:18px;\">\n        <div style=\"{{ labelStyle }}\">Your name<\u002Fdiv>\n        <input value=\"{{ ob.name }}\" onchange=\"{{ ob.onName }}\" placeholder=\"First and last name\" style=\"{{ inputStyle }} margin-top:7px;\">\n\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px 22px;margin-top:16px;\">\n          <div>\n            <div style=\"{{ labelStyle }}\">Role you're applying for<\u002Fdiv>\n            <select value=\"{{ ob.role }}\" onchange=\"{{ ob.onRole }}\" style=\"{{ inputStyle }} margin-top:7px;\">\n              <sc-for list=\"{{ ob.roles }}\" as=\"r\" hint-placeholder-count=\"4\"><option value=\"{{ r }}\">{{ r }}<\u002Foption><\u002Fsc-for>\n            <\u002Fselect>\n          <\u002Fdiv>\n          <div>\n            <div style=\"{{ labelStyle }}\">Years of experience<\u002Fdiv>\n            <input type=\"number\" value=\"{{ ob.years }}\" onchange=\"{{ ob.onYears }}\" placeholder=\"e.g. 8\" style=\"{{ inputStyle }} margin-top:7px;\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#F4F9FE;border:1px solid #D6E9FB;border-radius:10px;padding:13px 15px;margin-top:14px;\">\n          <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#1565C0;\">What this role needs<\u002Fdiv>\n          <p style=\"font-size:11.5px;line-height:1.5;color:#34465A;margin:6px 0 0;\">{{ ob.roleBlurb }}<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:16px;\">\n          <div style=\"{{ labelStyle }}\">Availability · hours per week<\u002Fdiv>\n          <input type=\"number\" value=\"{{ ob.avail }}\" onchange=\"{{ ob.onAvail }}\" style=\"{{ inputStyle }} margin-top:7px;max-width:160px;\">\n        <\u002Fdiv>\n\n        <div style=\"margin-top:16px;\">\n          <div style=\"{{ labelStyle }}\">Sector experience<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;\">\n            <sc-for list=\"{{ ob.sectorChips }}\" as=\"c\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ c.onClick }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px 22px;margin-top:16px;\">\n          <div>\n            <div style=\"{{ labelStyle }}\">Notable brands delivered into<\u002Fdiv>\n            <input value=\"{{ ob.brands }}\" onchange=\"{{ ob.onBrands }}\" placeholder=\"Comma separated\" style=\"{{ inputStyle }} margin-top:7px;\">\n          <\u002Fdiv>\n          <div>\n            <div style=\"{{ labelStyle }}\">Certifications / qualifications<\u002Fdiv>\n            <input value=\"{{ ob.certs }}\" onchange=\"{{ ob.onCerts }}\" placeholder=\"Comma separated\" style=\"{{ inputStyle }} margin-top:7px;\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:16px;\">\n          <div style=\"{{ labelStyle }}\">Short professional summary<\u002Fdiv>\n          <textarea value=\"{{ ob.bio }}\" onchange=\"{{ ob.onBio }}\" rows=\"3\" placeholder=\"A few lines on your background…\" style=\"{{ inputStyle }} margin-top:7px;resize:vertical;line-height:1.5;\"><\u002Ftextarea>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #E3E9EF;border-radius:14px;padding:22px;margin-top:16px;\">\n        <div style=\"font-size:15px;font-weight:600;color:#0B1829;\">Rate yourself against the role's skills<\u002Fdiv>\n        <p style=\"font-size:11.5px;color:#8595A4;margin:5px 0 0;\">None · Learning · Proficient · Expert. Be honest — gaps are expected and we cross-train.<\u002Fp>\n        <sc-for list=\"{{ ob.skillGroups }}\" as=\"grp\" hint-placeholder-count=\"2\">\n          <div style=\"margin-top:18px;\">\n            <div style=\"font-size:10.5px;font-weight:700;color:#C8973A;letter-spacing:.13em;text-transform:uppercase;margin-bottom:10px;\">{{ grp.name }}<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:10px;\">\n              <sc-for list=\"{{ grp.items }}\" as=\"it\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex;align-items:center;gap:14px;flex-wrap:wrap;\">\n                  <span style=\"flex:1;min-width:160px;font-size:12.5px;color:#34465A;\">{{ it.full }}<\u002Fspan>\n                  <div style=\"display:flex;gap:4px;background:#F1F4F7;padding:3px;border-radius:9px;\">\n                    <sc-for list=\"{{ it.segs }}\" as=\"sg\" hint-placeholder-count=\"4\">\n                      <button onclick=\"{{ sg.onClick }}\" title=\"{{ sg.title }}\" style=\"{{ sg.style }}\">{{ sg.label }}<\u002Fbutton>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <button onclick=\"{{ ob.onSubmit }}\" style=\"{{ ob.submitStyle }} margin-top:18px;\">Submit my self-assessment →<\u002Fbutton>\n      <p style=\"font-size:10.5px;color:#8595A4;text-align:center;margin-top:10px;\">Nothing is shared until you send the link on the next screen.<\u002Fp>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ ob.done }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"background:#fff;border:1px solid #E3E9EF;border-radius:16px;overflow:hidden;margin-top:6px;\">\n      <div style=\"background:#0B1829;color:#fff;padding:26px 26px 22px;\">\n        <div style=\"width:44px;height:4px;background:#C8973A;margin-bottom:14px;\"><\u002Fdiv>\n        <div style=\"font-size:24px;font-weight:300;\">Thank you, {{ ob.name }}.<\u002Fdiv>\n        <p style=\"font-size:12.5px;line-height:1.6;color:#9FB2C4;margin:9px 0 0;\">Your self-assessment is captured. Send the link below to <span style=\"color:#3F90E0;font-weight:500;\">Rachel Lane<\u002Fspan> so it can be added to the bench and confirmed in your 1-2-1.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:22px 26px 26px;\">\n        <div style=\"{{ labelStyle }}\">Your submission link<\u002Fdiv>\n        <div style=\"display:flex;gap:10px;margin-top:8px;\">\n          <input readonly=\"\" value=\"{{ ob.link }}\" style=\"{{ inputStyle }} font-size:11.5px;color:#5B6B7A;\">\n          <button onclick=\"{{ ob.onCopy }}\" style=\"font-size:12.5px;font-weight:600;color:#0B1829;background:#C8973A;border:none;border-radius:8px;padding:0 18px;white-space:nowrap;\">{{ ob.copyLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:10px;margin-top:16px;padding:13px 16px;background:#F4F9FE;border:1px solid #D6E9FB;border-radius:10px;\">\n          <span style=\"font-size:12px;color:#1565C0;font-weight:700;white-space:nowrap;\">Next<\u002Fspan>\n          <span style=\"font-size:11.5px;color:#34465A;\">Email or message the link to rachel@cxais.ai. You'll walk through it together in your review.<\u002Fspan>\n        <\u002Fdiv>\n        <button onclick=\"{{ ob.onEdit }}\" style=\"font-size:12px;font-weight:600;color:#5B6B7A;background:none;border:none;margin-top:14px;padding:0;cursor:pointer;\">← Edit my answers<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== REVIEW (manager imports a submission) ===== -->\n<sc-if value=\"{{ isReview }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"min-height:100vh;background:#EBEEF2;display:flex;align-items:flex-start;justify-content:center;padding:40px 22px;\">\n  <div style=\"width:100%;max-width:640px;background:#fff;border:1px solid #E3E9EF;border-radius:16px;overflow:hidden;box-shadow:0 18px 50px rgba(0,0,0,.14);\">\n    <div style=\"background:#0B1829;color:#fff;padding:22px 26px;display:flex;align-items:center;gap:14px;\">\n      <img src=\"8e461c65-0a45-43b2-b242-6663b05468ec\" alt=\"CXaiS\" style=\"height:26px;width:auto;\">\n      <div style=\"flex:1;font-size:13px;font-weight:600;\">Incoming self-assessment<\u002Fdiv>\n      <span style=\"font-size:10px;font-weight:700;letter-spacing:.1em;color:#0B1829;background:#C8973A;border-radius:20px;padding:4px 11px;\">PENDING 1-2-1<\u002Fspan>\n    <\u002Fdiv>\n    <sc-if value=\"{{ rev.valid }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"padding:22px 26px 26px;\">\n      <div style=\"font-size:22px;font-weight:600;color:#0B1829;\">{{ rev.name }}<\u002Fdiv>\n      <div style=\"font-size:12.5px;color:#1565C0;font-weight:600;margin-top:3px;\">{{ rev.role }}<\u002Fdiv>\n      <div style=\"font-size:12px;color:#8595A4;margin-top:6px;\">{{ rev.meta }}<\u002Fdiv>\n\n      <sc-if value=\"{{ rev.hasBio }}\" hint-placeholder-val=\"{{ false }}\">\n      <p style=\"font-size:12px;line-height:1.6;color:#34465A;margin:14px 0 0;\">{{ rev.bio }}<\u002Fp>\n      <\u002Fsc-if>\n\n      <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:#C8973A;margin:18px 0 10px;\">Self-rated skills<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px 22px;\">\n        <sc-for list=\"{{ rev.skills }}\" as=\"sk\" hint-placeholder-count=\"6\">\n          <div style=\"display:flex;align-items:center;gap:10px;\">\n            <span style=\"{{ sk.badge }}\">{{ sk.level }}<\u002Fspan>\n            <span style=\"font-size:11px;color:#34465A;\">{{ sk.name }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;gap:10px;margin-top:24px;\">\n        <button onclick=\"{{ rev.onAccept }}\" style=\"flex:1;font-size:13px;font-weight:600;color:#fff;background:#1565C0;border:none;border-radius:10px;padding:13px;\">Add to bench as pending →<\u002Fbutton>\n        <button onclick=\"{{ rev.onDiscard }}\" style=\"font-size:13px;font-weight:600;color:#5B6B7A;background:#F1F4F7;border:none;border-radius:10px;padding:13px 18px;\">Discard<\u002Fbutton>\n      <\u002Fdiv>\n      <p style=\"font-size:10.5px;color:#8595A4;text-align:center;margin-top:11px;\">They'll appear on the bench flagged <strong style=\"color:#9A6F1E;\">Pending 1-2-1<\u002Fstrong> until you confirm them.<\u002Fp>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ rev.invalid }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"padding:40px 26px;text-align:center;color:#8595A4;font-size:13px;\">This submission link couldn't be read. Ask the consultant to resend it.<\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ isApp }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"min-height:100vh;display:flex;flex-direction:column;\">\n\n  <!-- ===== TOP BAR ===== -->\n  <div class=\"app-chrome\" style=\"background:#0B1829;color:#fff;padding:14px 26px;display:flex;align-items:center;gap:26px;position:sticky;top:0;z-index:20;\">\n    <img src=\"8e461c65-0a45-43b2-b242-6663b05468ec\" alt=\"CXaiS\" style=\"height:30px;width:auto;display:block;\">\n    <div style=\"width:1px;height:26px;background:rgba(255,255,255,.16);\"><\u002Fdiv>\n    <div style=\"font-size:14px;font-weight:600;letter-spacing:.02em;\">Bench &amp; Staffing Planner<\u002Fdiv>\n    <div style=\"flex:1;\"><\u002Fdiv>\n    <div style=\"display:flex;gap:6px;background:rgba(255,255,255,.06);padding:5px;border-radius:10px;\">\n      <sc-for list=\"{{ tabs }}\" as=\"tab\" hint-placeholder-count=\"4\">\n        <button onclick=\"{{ tab.onClick }}\" style=\"{{ tab.style }}\">{{ tab.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== CONTENT ===== -->\n  <div class=\"app-chrome\" style=\"flex:1;padding:24px 26px 60px;max-width:1320px;width:100%;margin:0 auto;\">\n\n    <!-- ============ BENCH MATRIX ============ -->\n    <sc-if value=\"{{ isBench }}\" hint-placeholder-val=\"{{ true }}\">\n    <div>\n      <div style=\"display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;\">\n        <div>\n          <div style=\"font-size:22px;font-weight:600;letter-spacing:-.01em;\">Bench skills matrix<\u002Fdiv>\n          <div style=\"font-size:13px;color:#5B6B7A;margin-top:4px;\">Where the capability gaps are. Click any cell to update proficiency.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:center;\">\n          <sc-for list=\"{{ legend }}\" as=\"lg\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex;align-items:center;gap:7px;\">\n              <span style=\"{{ lg.dot }}\">{{ lg.letter }}<\u002Fspan>\n              <span style=\"font-size:11.5px;color:#5B6B7A;font-weight:500;\">{{ lg.label }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-for list=\"{{ benchSections }}\" as=\"sec\" hint-placeholder-count=\"4\">\n        <div style=\"background:#fff;border:1px solid #E3E9EF;border-radius:12px;margin-bottom:16px;overflow:hidden;\">\n          <div style=\"background:#0B1829;color:#fff;padding:11px 18px;display:flex;align-items:center;gap:12px;\">\n            <span style=\"font-size:14px;font-weight:600;\">{{ sec.role }}<\u002Fspan>\n            <span style=\"font-size:11px;font-weight:600;color:#4FC3F7;background:rgba(79,195,247,.12);padding:3px 9px;border-radius:20px;\">{{ sec.countLabel }}<\u002Fspan>\n            <div style=\"flex:1;\"><\u002Fdiv>\n            <span style=\"font-size:11px;color:#7E94A8;\">{{ sec.loadLabel }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"overflow-x:auto;\">\n            <div style=\"{{ sec.gridStyle }}\">\n              <!-- header -->\n              <div style=\"padding:10px 14px;font-size:11px;font-weight:700;color:#5B6B7A;letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid #EDF1F5;background:#FAFBFC;position:sticky;left:0;z-index:2;\">Consultant<\u002Fdiv>\n              <sc-for list=\"{{ sec.skills }}\" as=\"sk\" hint-placeholder-count=\"8\">\n                <div title=\"{{ sk.full }}\" style=\"padding:10px 4px;font-size:10px;font-weight:600;color:#5B6B7A;text-align:center;border-bottom:1px solid #EDF1F5;background:#FAFBFC;display:flex;align-items:center;justify-content:center;line-height:1.2;\">{{ sk.label }}<\u002Fdiv>\n              <\u002Fsc-for>\n              <div style=\"padding:10px 10px;font-size:10px;font-weight:700;color:#5B6B7A;letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid #EDF1F5;background:#FAFBFC;text-align:center;\">Avail<\u002Fdiv>\n              <div style=\"padding:10px 12px;font-size:10px;font-weight:700;color:#5B6B7A;letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid #EDF1F5;background:#FAFBFC;text-align:center;\">Ready<\u002Fdiv>\n\n              <!-- rows -->\n              <sc-for list=\"{{ sec.rows }}\" as=\"row\" hint-placeholder-count=\"2\">\n                <div style=\"{{ row.nameCellStyle }}\">\n                  <button onclick=\"{{ row.onOpen }}\" style=\"background:none;border:none;padding:0;text-align:left;display:flex;flex-direction:column;gap:2px;\">\n                    <span style=\"display:flex;align-items:center;gap:7px;\"><span style=\"font-size:13px;font-weight:600;color:#1F2D3D;\">{{ row.name }}<\u002Fspan><sc-if value=\"{{ row.pending }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:8px;font-weight:700;letter-spacing:.06em;color:#9A6F1E;background:#FBEACB;border-radius:5px;padding:2px 6px;\">PENDING<\u002Fspan><\u002Fsc-if><\u002Fspan>\n                    <span style=\"font-size:10.5px;color:#8595A4;\">{{ row.meta }}<\u002Fspan>\n                  <\u002Fbutton>\n                <\u002Fdiv>\n                <sc-for list=\"{{ row.cells }}\" as=\"cell\" hint-placeholder-count=\"8\">\n                  <div style=\"{{ cell.wrapStyle }}\">\n                    <button onclick=\"{{ cell.onCycle }}\" title=\"{{ cell.title }}\" style=\"{{ cell.style }}\">{{ cell.letter }}<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <div style=\"{{ row.availCellStyle }}\"><span style=\"font-size:12px;font-weight:600;color:#34465A;\">{{ row.avail }}<\u002Fspan><\u002Fdiv>\n                <div style=\"{{ row.readyCellStyle }}\"><span style=\"{{ row.ragStyle }}\">{{ row.ragLabel }}<\u002Fspan><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ ROLES / JOB DESCRIPTIONS ============ -->\n    <sc-if value=\"{{ isRoles }}\" hint-placeholder-val=\"{{ true }}\">\n    <div>\n      <div style=\"margin-bottom:18px;\">\n        <div style=\"font-size:22px;font-weight:600;letter-spacing:-.01em;\">Programme roles<\u002Fdiv>\n        <div style=\"font-size:13px;color:#5B6B7A;margin-top:4px;\">The four job descriptions on the Value at Stake programme, and who you have on the bench for each.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:22px;align-items:flex-start;\">\n        <!-- role list -->\n        <div style=\"flex:0 0 236px;display:flex;flex-direction:column;gap:8px;\">\n          <sc-for list=\"{{ rolesList }}\" as=\"r\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ r.onClick }}\" style=\"{{ r.style }}\">\n              <div style=\"font-size:13.5px;font-weight:600;color:#1F2D3D;\">{{ r.role }}<\u002Fdiv>\n              <div style=\"font-size:11px;color:#8595A4;margin-top:3px;\">{{ r.sub }}<\u002Fdiv>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- JD detail -->\n        <div style=\"flex:1;background:#fff;border:1px solid #E3E9EF;border-radius:14px;overflow:hidden;\">\n          <div style=\"background:#0B1829;color:#fff;padding:22px 24px 20px;\">\n            <div style=\"display:flex;justify-content:space-between;align-items:flex-start;\">\n              <div style=\"font-size:10px;font-weight:700;letter-spacing:.18em;color:#C8973A;\">{{ jd.level }}<\u002Fdiv>\n              <div style=\"font-size:10px;font-weight:600;letter-spacing:.1em;color:#7E94A8;\">{{ jd.location }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"width:44px;height:4px;background:#C8973A;margin:13px 0 11px;\"><\u002Fdiv>\n            <div style=\"font-size:30px;font-weight:300;line-height:1.05;\">{{ jd.role }}<\u002Fdiv>\n            <div style=\"font-size:13px;font-weight:500;color:#3F90E0;margin-top:8px;\">{{ jd.blurb }}<\u002Fdiv>\n            <div style=\"display:flex;gap:32px;margin-top:16px;\">\n              <sc-for list=\"{{ jd.stats }}\" as=\"st\" hint-placeholder-count=\"3\">\n                <div>\n                  <div style=\"font-size:23px;font-weight:300;color:#4FC3F7;line-height:1;\">{{ st.value }}<\u002Fdiv>\n                  <div style=\"font-size:9.5px;color:#9FB2C4;margin-top:5px;letter-spacing:.05em;text-transform:uppercase;\">{{ st.label }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"padding:20px 24px 24px;\">\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:.14em;color:#C8973A;\">THE ROLE<\u002Fdiv>\n            <p style=\"font-size:12px;line-height:1.6;color:#34465A;margin:8px 0 0;\">{{ jd.summary }}<\u002Fp>\n\n            <div style=\"background:#0B1829;border-radius:10px;padding:15px 20px;margin-top:18px;\">\n              <div style=\"font-size:11px;font-weight:700;letter-spacing:.14em;color:#4FC3F7;text-transform:uppercase;\">{{ jd.seqTitle }}<\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px 24px;margin-top:13px;\">\n                <sc-for list=\"{{ jd.sequence }}\" as=\"sq\" hint-placeholder-count=\"4\">\n                  <div style=\"display:flex;gap:11px;align-items:flex-start;\">\n                    <span style=\"font-size:12px;font-weight:700;color:#C8973A;flex:0 0 auto;\">{{ sq.n }}<\u002Fspan>\n                    <div>\n                      <div style=\"font-size:12.5px;font-weight:600;color:#fff;\">{{ sq.name }}<\u002Fdiv>\n                      <div style=\"font-size:10px;line-height:1.4;color:#9FB2C4;margin-top:3px;\">{{ sq.desc }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:30px;margin-top:18px;\">\n              <div style=\"flex:1.25;\">\n                <div style=\"font-size:11px;font-weight:700;letter-spacing:.14em;color:#C8973A;\">WHAT THEY MUST BRING<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:7px;margin-top:11px;\">\n                  <sc-for list=\"{{ jd.requirements }}\" as=\"rq\" hint-placeholder-count=\"6\">\n                    <div style=\"display:flex;gap:10px;align-items:flex-start;\">\n                      <span style=\"flex:0 0 auto;width:6px;height:6px;border-radius:50%;background:#1565C0;margin-top:5px;\"><\u002Fspan>\n                      <span style=\"font-size:11px;line-height:1.45;color:#34465A;\">{{ rq }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"flex:1;\">\n                <div style=\"font-size:11px;font-weight:700;letter-spacing:.14em;color:#C8973A;\">STRENGTHENS AN APPLICATION<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:8px;margin-top:11px;align-items:flex-start;\">\n                  <sc-for list=\"{{ jd.strengthen }}\" as=\"sg\" hint-placeholder-count=\"3\">\n                    <div style=\"font-size:10.5px;font-weight:600;color:#1F2D3D;background:#F1F4F7;border:1px solid #E3E9EF;border-radius:999px;padding:7px 14px;\">{{ sg }}<\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;align-items:center;gap:14px;margin-top:20px;padding:13px 16px;background:#F7F9FB;border:1px solid #E8EDF2;border-radius:10px;\">\n              <div style=\"flex:1;font-size:11.5px;color:#5B6B7A;font-weight:500;\">{{ jd.benchLabel }}<\u002Fdiv>\n              <button onclick=\"{{ jd.onViewBench }}\" style=\"font-size:11.5px;font-weight:600;color:#1565C0;background:#E8F4FD;border:none;border-radius:8px;padding:9px 14px;white-space:nowrap;\">View on bench →<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ PEOPLE / SELF-ASSESSMENT ============ -->\n    <sc-if value=\"{{ isPeople }}\" hint-placeholder-val=\"{{ true }}\">\n    <div>\n      <div style=\"display:flex;align-items:center;gap:14px;background:#0B1829;border-radius:12px;padding:14px 18px;margin-bottom:16px;\">\n        <div style=\"flex:1;\">\n          <div style=\"font-size:13px;font-weight:600;color:#fff;\">Invite a consultant to self-assess<\u002Fdiv>\n          <div style=\"font-size:11px;color:#9FB2C4;margin-top:3px;\">Send this link. They complete the checklist on their own device and return a submission link, which lands here as pending 1-2-1 review.<\u002Fdiv>\n        <\u002Fdiv>\n        <input readonly=\"\" value=\"{{ inviteLink }}\" style=\"font-size:11.5px;color:#CFE0EE;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:9px 11px;width:230px;\">\n        <button onclick=\"{{ onCopyInvite }}\" style=\"font-size:12.5px;font-weight:600;color:#0B1829;background:#C8973A;border:none;border-radius:8px;padding:10px 15px;white-space:nowrap;\">{{ copyLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:22px;align-items:flex-start;\">\n      <!-- list -->\n      <div style=\"flex:0 0 256px;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;\">\n          <div style=\"font-size:13px;font-weight:700;color:#5B6B7A;letter-spacing:.04em;text-transform:uppercase;\">Bench · {{ peopleCount }}<\u002Fdiv>\n          <button onclick=\"{{ onAddPerson }}\" style=\"font-size:12px;font-weight:600;color:#1565C0;background:#E8F4FD;border:none;border-radius:7px;padding:7px 11px;\">+ Add<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:7px;\">\n          <sc-for list=\"{{ peopleList }}\" as=\"p\" hint-placeholder-count=\"6\">\n            <button onclick=\"{{ p.onClick }}\" style=\"{{ p.style }}\">\n              <div style=\"display:flex;align-items:center;gap:10px;\">\n                <span style=\"{{ p.avatar }}\">{{ p.initials }}<\u002Fspan>\n                <div style=\"text-align:left;flex:1;min-width:0;\">\n                  <div style=\"font-size:13px;font-weight:600;color:#1F2D3D;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ p.name }}<\u002Fdiv>\n                  <div style=\"{{ p.roleStyle }}\">{{ p.roleMeta }}<\u002Fdiv>\n                <\u002Fdiv>\n                <span style=\"{{ p.ragDot }}\"><\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- editor -->\n      <div style=\"flex:1;background:#fff;border:1px solid #E3E9EF;border-radius:14px;overflow:hidden;\">\n        <div style=\"background:#0B1829;color:#fff;padding:18px 22px;display:flex;align-items:center;gap:16px;\">\n          <span style=\"{{ sel.avatarLg }}\">{{ sel.initials }}<\u002Fspan>\n          <div style=\"flex:1;\">\n            <input value=\"{{ sel.name }}\" onchange=\"{{ sel.onName }}\" style=\"font-size:19px;font-weight:600;color:#fff;background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,.2);padding:2px 0;width:100%;outline:none;\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-top:8px;\">\n              <select value=\"{{ sel.role }}\" onchange=\"{{ sel.onRole }}\" style=\"font-size:12px;font-weight:600;color:#0B1829;background:#4FC3F7;border:none;border-radius:6px;padding:5px 8px;\">\n                <sc-for list=\"{{ roles }}\" as=\"r\" hint-placeholder-count=\"4\"><option value=\"{{ r }}\">{{ r }}<\u002Foption><\u002Fsc-for>\n              <\u002Fselect>\n              <span style=\"{{ sel.ragStyle }}\">{{ sel.ragLabel }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ sel.onExport }}\" style=\"font-size:12px;font-weight:600;color:#0B1829;background:#C8973A;border:none;border-radius:8px;padding:9px 14px;\">Export profile →<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"padding:20px 22px;\">\n          <sc-if value=\"{{ sel.pending }}\" hint-placeholde &quot;:{&quot;width&quot;:1280,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  C = { NIGHT:'#0B1829', BLUE:'#1565C0', SIGNAL:'#4FC3F7', GOLD:'#C8973A', VEXA:'#3F90E0', INK:'#1F2D3D', SLATE:'#34465A', LINE:'#DCE3EB' };\n  KEY = 'cxais_bench_v3';\n  LOCKED = true; /* consultant-only build: admin views can never render */\n  LEVELS = ['None','Learning','Proficient','Expert'];\n  ROLES = ['Engagement Lead','Senior Consultant','Consultant','Data & Workflow Intelligence Analyst'];\n  SECTORS = ['Financial Services','Insurance','Utilities & Energy','Telecoms','Retail & eCommerce','Travel & Hospitality','Healthcare & Pharma','Public Sector & Government','Media & Technology','Manufacturing & Industrial','Automotive','Transport & Logistics','Other'];\n  LOAD = { 'Engagement Lead':4, 'Senior Consultant':16, 'Consultant':20, 'Data & Workflow Intelligence Analyst':10 };\n\n  SEQ = [\n    {n:'01', name:'Workflow Cartography', desc:'Operator-grade current-state maps across all in-scope workflows'},\n    {n:'02', name:'Handoff Forensics', desc:'Broken handoffs, undocumented approvals, queue time, role ambiguity, single points of failure'},\n    {n:'03', name:'Architecture Audit', desc:'System architecture layered onto workflow maps; data-lineage gaps and AI blast radius'},\n    {n:'04', name:'Readiness Verdict', desc:'Binary GREEN/RED readiness per workflow, ranked by realistic NPV'},\n  ];\n\n  JD = {\n    'Engagement Lead':{\n      level:'Senior Contractor', location:'Remote with client travel', commit:'~40 hrs', cadence:'10-week',\n      blurb:'The most senior client-facing role on the programme.',\n      summary:'You set the tone in week one, navigate the political landscape, and own the final executive readout. This is not a project management role — it is a senior advisory role that demands the experience and confidence to make a call when the data is ambiguous.',\n      seqVerb:'The four-skill sequence you oversee',\n      requirements:[\n        '15+ years in CX, contact centre or operational leadership, with time at director level or above',\n        'A track record delivering programmes into recognisable, world-class brands, or leading CX teams within them',\n        'Deep understanding of the CX technology stack across service layer, AI, WFM, CCaaS, VoC and analytics',\n        'Proven ability to present analytical findings to C-suite and board audiences with confidence and clarity',\n        'Experience navigating organisational complexity — unions, regulatory constraints, stakeholder resistance',\n        'The ability to synthesise multi-stream analytical work into a single, confident recommendation',\n      ],\n      strengthen:['AI / automation programme delivery within CX or operations','Big Consulting environments, buying or delivery side','Financial services · utilities · telecoms · retail'],\n    },\n    'Senior Consultant':{\n      level:'Senior Contractor', location:'Remote with client travel', commit:'~160 hrs', cadence:'10-week',\n      blurb:'You run the analytical core of engagements inside the world\\u2019s largest brands.',\n      summary:'You run the four-skill sequence across up to 18 workflows per programme. You interview stakeholders, interrogate process documents, surface the gaps the client cannot see, and build the ranked portfolio that goes to the board. This is not a strategy-slide role — it is structured, rigorous, deep analytical work, synthesised into a recommendation that is commercially credible and operationally honest.',\n      seqVerb:'The four-skill sequence you\\u2019ll run',\n      requirements:[\n        '8+ years in operational consulting, CX transformation or contact-centre programme delivery',\n        'A track record delivering programmes into recognisable, world-class brands, or leading CX teams within them',\n        'Deep understanding of the CX technology stack: contact-centre platforms, AI, CRM and enterprise data infrastructure',\n        'Direct experience mapping enterprise business processes and identifying failure points at workflow level',\n        'Discipline to work within a rigorous framework and surface anomalies rather than paper over them',\n        'Strong written output, producing artefacts that are decision-ready without editorial rework',\n      ],\n      strengthen:['AI / automation readiness assessments','Big Consulting delivery methodology','Financial services · utilities · telecoms · retail'],\n    },\n    'Consultant':{\n      level:'Contractor', location:'Remote with client travel', commit:'~200 hrs', cadence:'10-week',\n      blurb:'Owns assigned workflow assessments end to end.',\n      summary:'You run the four-skill analytical sequence across your assigned workflows, with Senior Consultant quality review at defined checkpoints. You follow a rigorous process, produce accurate outputs, and flag what you cannot resolve from documentation so the interview layer can fill the gaps.',\n      seqVerb:'The four-skill sequence you run',\n      requirements:[\n        '4+ years in management consulting, CX transformation, operations or contact-centre delivery',\n        'Experience delivering into recognisable, world-class brands, or within large CX teams at scale',\n        'Working knowledge of the CX technology stack — contact-centre platforms, AI tooling and CRM systems',\n        'Experience analysing and documenting business processes accurately and completely',\n        'Discipline to manage concurrent workstreams to deadline and hold output consistency unsupervised',\n        'Strong written output, with attention to structural completeness and factual precision',\n      ],\n      strengthen:['AI or automation readiness in enterprise environments','Structured consulting programme methodology','Financial services · utilities · telecoms · retail'],\n    },\n    'Data & Workflow Intelligence Analyst':{\n      level:'Contractor', location:'Remote with client access', commit:'~100 hrs', cadence:'10-week',\n      blurb:'The analyst who reads the client’s real data environment and judges whether it can support AI.',\n      summary:'You go into the client environment and find out what is actually there. What exists, what is reliable, and what will and will not support AI deployment at workflow level. You produce a Data Readiness Assessment per workflow that feeds the Senior Consultant’s GREEN/RED verdicts. This is not a data engineering role — you read a data environment and form a judgment, not build one.',\n      seqVerb:'The four-skill sequence you support',\n      requirements:[\n        '5+ years in a data analysis, business intelligence or CX analytics role within enterprise environments',\n        'Proven ability to assess data infrastructure and judge its fitness for AI or automation deployment',\n        'Experience working inside or alongside large CX operations, contact centres or enterprise service delivery',\n        'Familiarity with CX data systems including CCaaS, CRM, WFM, VoC tools and data integration layers',\n        'Strong structured written output, producing assessments that are complete and factually precise without rework',\n        'Discipline to hold analytical consistency across concurrent workflows, surfacing anomalies rather than smoothing them',\n      ],\n      strengthen:['AI or automation readiness in enterprise CX','Data quality assessment and governance','Contact centre platform architecture'],\n    },\n  };\n\n  SKILLS = {\n    'Engagement Lead':[\n      {id:'el_carto',label:'Cartography',full:'Workflow Cartography — oversight',group:'Four-skill oversight'},\n      {id:'el_foren',label:'Forensics',full:'Handoff Forensics — oversight',group:'Four-skill oversight'},\n      {id:'el_arch',label:'Architecture',full:'Architecture Audit — oversight',group:'Four-skill oversight'},\n      {id:'el_verdict',label:'Verdict',full:'Readiness Verdict — oversight',group:'Four-skill oversight'},\n      {id:'el_sponsor',label:'Sponsor',full:'Own COO & boar ,\n      {id:'sc_exp',label:'8+ yrs',full:'8+ yrs operational consulting / CX transformation delivery',group:'Experience & domain'},\n      {id:'sc_stack',label:'CX Stack',full:'CX stack + AI, CRM & enterprise data infrastructure',group:'Experience & domain'},\n      {id:'sc_process',label:'Process Mapping',full:'Map enterprise processes & identify failure points',group:'Experience & domain'},\n      {id:'sc_writing',label:'Writing',full:'Decision-ready written output without editorial rework',group:'Experience & domain'},\n    ],\n    'Consultant':[\n      {id:'c_carto',label:'Cartography',full:'Workflow Cartography',group:'Four-skill sequence'},\n      {id:'c_foren',label:'Forensics',full:'Handoff Forensics',group:'Four-skill sequence'},\n      {id:'c_arch',label:'Architecture',full:'Architecture Audit',group:'Four-skill sequence'},\n      {id:'c_verdict',label:'Verdict',full:'Readiness Verdict',group:'Four-skill sequence'},\n      {id:'c_docs',label:'Doc Review',full:'Document review & gap analysis (SOPs, maps, architecture)',group:'Delivery'},\n      {id:'c_interview',label:'Interviews',full:'Structured stakeholder interviews',group:'Delivery'},\n      {id:'c_template',label:'Artefacts',full:'Produce artefacts to programme template',group:'Delivery'},\n      {id:'c_portfolio',label:'Portfolio',full:'Contribute to ranked portfolio & Wave 1 brief',group:'Delivery'},\n      {id:'c_flag',label:'Risk Flags',full:'Flag political, labour, regulatory & output anomalies',group:'Delivery'},\n      {id:'c_exp',label:'4+ yrs',full:'4+ yrs consulting / CX / operations delivery',group:'Experience & domain'},\n      {id:'c_stack',label:'CX Stack',full:'CX technology stack (working knowledge)',group:'Experience & domain'},\n      {id:'c_process',label:'Process Docs',full:'Accurate, complete process documentation',group:'Experience & domain'},\n      {id:'c_workstream',label:'Workstreams',full:'Manage concurrent workstreams unsupervised',group:'Experience & domain'},\n    ],\n    'Data & Workflow Intelligence Analyst':[\n      {id:'d_carto',label:'Cartography',full:'Workflow Cartography — data support',group:'Four-skill sequence (support)'},\n      {id:'d_foren',label:'Forensics',full:'Handoff Forensics — data support',group:'Four-skill sequence (support)'},\n      {id:'d_arch',label:'Architecture',full:'Architecture Audit — data support',group:'Four-skill sequence (support)'},\n      {id:'d_verdict',label:'Verdict Data',full:'Own the data layer of each Readiness Verdict',group:'Four-skill sequence (support)'},\n      {id:'d_audit',label:'Data Audit',full:'Audit client data environments at workflow level',group:'What you deliver'},\n      {id:'d_dra',label:'Readiness Assess',full:'Produce a Data Readiness Assessment per workflow',group:'What you deliver'},\n      {id:'d_signal',label:'Signal & VoC',full:'Evaluate signal-to-noise ratios & VoC reliability',group:'What you deliver'},\n      {id:'d_gaps',label:'Data Gaps',full:'Identify data gaps & architecture mismatches (AI blast radius)',group:'What you deliver'},\n      {id:'d_factcheck',label:'Fact-check',full:'Fact-check data-dependent claims; evidence every verdict',group:'What you deliver'},\n      {id:'d_systems',label:'CX Data Systems',full:'CCaaS, CRM, WFM, VoC & data integration layers',group:'Experience & domain'},\n      {id:'d_infra',label:'Infra Fitness',full:'Assess data infrastructure fitness for AI deployment',group:'Experience & domain'},\n      {id:'d_exp',label:'5+ yrs',full:'5+ yrs data analysis / BI / CX analytics (enterprise)',group:'Experience & domain'},\n      {id:'d_compliance',label:'Compliance',full:'Data compliance, governance & sovereignty awareness',group:'Experience & domain'},\n    ],\n  };\n\n  state = this.initialState();\n\n  initialState(){\n    const saved = this.load();\n    const base = saved || { people: this.seed(), projects: this.seedProjects() };\n    return {\n      view:'bench',\n      mode: this.LOCKED ? 'onboard' : 'app', onboardDraft:null, reviewDraft:null, inviteCopied:false,\n      selectedRole: this.ROLES[0],\n      selectedPersonId: base.people[0] && base.people[0].id,\n      selectedProjectId: base.projects[0] ? base.projects[0].id : null,\n      exportType:'person',\n      exportPersonId: base.people[0] && base.people[0].id,\n      exportProjectId: base.projects[0] ? base.projects[0].id : null,\n      anon:false,\n      booking:{ client:'', sector:'Financial Services', weeks:10 },\n      people: base.people,\n      projects: base.projects,\n    };\n  }\n\n  isVerified(p){ return p && p.verified!==false; }\n\n  componentDidMount(){ this.syncMode(); this._onHash=()=>this.syncMode(); try{ window.addEventListener('hashchange', this._onHash); }catch(e){} }\n  componentWillUnmount(){ try{ window.removeEventListener('hashchange', this._onHash); }catch(e){} }\n  syncMode(){\n    let h=''; try{ h=(location.hash||'').replace(/^#/,''); }catch(e){}\n    if(h.indexOf('review=')===0 && this.LOCKED){\n      this.setState({mode:'onboard', onboardDraft: this.state.onboardDraft || this.blankDraft()});\n      return;\n    }\n    if(h.indexOf('review=')===0){\n      const code=h.slice(7); let draft=null;\n      try{ draft=JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(code))))); }catch(e){}\n      this.setState({mode:'review', reviewDraft:draft});\n    } else if(h==='onboard'){\n      this.setState({mode:'onboard', onboardDraft: this.state.onboardDraft || this.blankDraft()});\n    } else if(this.LOCKED){\n      this.setState({mode:'onboard', onboardDraft: this.state.onboardDraft || this.blankDraft()});\n    } else {\n      this.setState({mode:'app'});\n    }\n  }\n  blankDraft(){ const role=this.ROLES[0]; const skills={}; this.skillsFor(role).forEach(s=>skills[s.id]='None');\n    return {name:'',role,years:'',avail:'40',sector:[],brands:'',certs:'',bio:'',skills,submitted:false,link:''}; }\n  patchDraft(patch){ this.setState({onboardDraft:{...(this.state.onboardDraft||this.blankDraft()), ...patch}}); }\n  draftRole(role){ const d=this.state.onboardDraft; const skills={}; this.skillsFor(role).forEach(s=>{ skills[s.id]=(d.skills&&d.skills[s.id])||'None'; }); this.patchDraft({role,skills}); }\n  draftSkill(sid,level){ const d=this.state.onboardDraft; this.patchDraft({skills:{...d.skills,[sid]:level}}); }\n  draftSector(s){ const d=this.state.onboardDraft; const has=d.sector.includes(s); this.patchDraft({sector:has?d.sector.filter(x=>x!==s):[...d.sector,s]}); }\n  encDraft(o){ return encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify(o))))); }\n  baseUrl(){ try{ return location.href.split('#')[0]; }catch(e){ return ''; } }\n  inviteLink(){ return this.baseUrl()+'#onboard'; }\n  copyText(t, inputEl){\n    let ok=false;\n    try{\n      let el=inputEl, temp=false;\n      if(!el){ el=document.createElement('textarea'); el.value=t; el.style.position='fixed'; el.style.opacity='0'; el.style.top='0'; document.body.appendChild(el); temp=true; }\n      el.focus(); el.select(); try{ el.setSelectionRange(0,(t||'').length); }catch(e){}\n      ok=document.execCommand('copy');\n      if(temp) document.body.removeChild(el);\n    }catch(e){}\n    if(!ok){ try{ if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(()=>{}).catch(()=>{}); } }catch(e){} }\n    return ok;\n  }\n  submitDraft(){\n    const d=this.state.onboardDraft; if(!d || !d.name.trim()) return;\n    const payload={ name:d.name.trim(), role:d.role, years:Number(d.years)||0, avail:Number(d.avail)||40,\n      sector:d.sector, brands:(d.brands||'').split(',').map(x=>x.trim()).filter(Boolean),\n      certs:(d.certs||'').split(',').map(x=>x.trim()).filter(Boolean), bio:(d.bio||'').trim(), skills:d.skills };\n    const link=this.baseUrl()+'#review='+this.encDraft(payload);\n    this.patchDraft({submitted:true, link});\n  }\n  acceptReview(){\n    if(this.LOCKED) return;\n    const d=this.state.reviewDraft; if(!d) return;\n    const id=this.uid(); const skills={}; this. entTarget?e.currentTarget.previousElementSibling:null; this.copyText(this.inviteLink(), inp); this.setState({inviteCopied:true}); setTimeout(()=>this.setState({inviteCopied:false}),1800); },\n      isBench:view==='bench', isRoles:view==='roles', isPeople:view==='people', isProjects:view==='projects', isExport:view==='export',\n      tabs, legend, benchSections,\n      rolesList:rolesData.list, jd:rolesData.detail,\n      roles:this.ROLES, sectors:this.SECTORS,\n      peopleList, peopleCount:S.people.length, sel:selVals, onAddPerson:()=>this.addPerson(),\n      labelStyle:this.labelStyle(), inputStyle:this.inputStyle(),\n      capacity, projectsList, proj:projVals, booking,\n      exp };\n  }\n\n  slotInfo(proj, role){\n    const pid=proj.team[role]; const p=pid?this.personById(pid):null;\n    if(!p) return { assigned:false, rag:'red', ragLabel:'Unstaffed', missing:[], capNote:'No one assigned', capWarn:true };\n    const r=this.readiness(p);\n    const missing=this.skillsFor(role).filter(s=>this.levelIdx(p.skills[s.id]||'None')<2).map(s=>s.label);\n    const others=this.assignmentsOf(p.id).filter(x=>x.id!==proj.id);\n    const capWarn=others.length>0 || p.avail < this.LOAD[role];\n    const capNote = others.length>0 ? `Also on ${others.map(o=>o.client).join(', ')}` : (p.avail<this.LOAD[role] ? `Only ${p.avail}h free · needs ${this.LOAD[role]}h` : `${p.avail}h/week available`);\n    return { assigned:true, rag:r.rag, ragLabel:r.label, missing, capNote, capWarn };\n  }\n\n  buildRoles(){\n    const S=this.state;\n    const selRole = this.ROLES.includes(S.selectedRole) ? S.selectedRole : this.ROLES[0];\n    const list=this.ROLES.map(role=>{\n      const ppl=S.people.filter(p=>p.role===role);\n      const ready=ppl.filter(p=>this.readiness(p).rag==='green').length;\n      const active=role===selRole;\n      return { role, sub:`${ppl.length} on bench · ${ready} ready`, onClick:()=>this.setState({selectedRole:role}),\n        style:`text-align:left;border:1px solid ${active?'#1565C0':'#E3E9EF'};background:${active?'#F4F9FE':'#fff'};border-radius:10px;padding:12px 14px;` };\n    });\n    const jd=this.JD[selRole];\n    const ppl=S.people.filter(p=>p.role===selRole);\n    const ready=ppl.filter(p=>this.readiness(p).rag==='green').length;\n    const partial=ppl.filter(p=>this.readiness(p).rag==='amber').length;\n    const gaps=ppl.filter(p=>this.readiness(p).rag==='red').length;\n    const detail={\n      role:selRole, level:jd.level, location:jd.location, blurb:jd.blurb, summary:jd.summary,\n      seqTitle:jd.seqVerb, sequence:this.SEQ, requirements:jd.requirements, strengthen:jd.strengthen,\n      stats:[ {value:jd.commit, label:'Per engagement'}, {value:jd.cadence, label:'Cadence'}, {value:String(ppl.length), label:'On bench'} ],\n      benchLabel:`${ppl.length} on bench · ${ready} ready · ${partial} partial · ${gaps} with gaps`,\n      onViewBench:()=>this.setState({view:'bench'}),\n    };\n    return { list, detail };\n  }\n\n  buildOnboard(){\n    const d=this.state.onboardDraft||this.blankDraft();\n    const jd=this.JD[d.role]||{};\n    const groups=[]; const seen={};\n    this.skillsFor(d.role).forEach(sk=>{ if(!seen[sk.group]){ seen[sk.group]={name:sk.group,items:[]}; groups.push(seen[sk.group]); }\n      const cur=(d.skills&&d.skills[sk.id])||'None';\n      const segs=this.LEVELS.map(l=>{ const on=l===cur; const st=this.levelStyle(l);\n        return { label:l, title:l, onClick:()=>this.draftSkill(sk.id,l),\n          style:`flex:1;min-width:78px;font-size:11px;font-weight:600;border:none;border-radius:7px;padding:9px 6px;${on?`background:${st.bg};color:${st.fg};`:'background:#F1F4F7;color:#9DAAB7;'}` }; });\n      seen[sk.group].items.push({ full:sk.full, segs }); });\n    const sectorChips=this.SECTORS.map(s=>{ const on=d.sector.includes(s);\n      return { label:s, onClick:()=>this.draftSector(s),\n        style:`font-size:11.5px;font-weight:600;border-radius:999px;padding:7px 13px;border:1px solid ${on?'#1565C0':'#D7DEE6'};background:${on?'#1565C0':'#fff'};color:${on?'#fff':'#5B6B7A'};` }; });\n    return { form:!d.submitted, done:!!d.submitted, link:d.link||'', copyLabel:d.copied?'Copied \\u2713':'Copy',\n      name:d.name, role:d.role, years:String(d.years), avail:String(d.avail), brands:d.brands, certs:d.certs, bio:d.bio,\n      roleBlurb:jd.blurb||'', roles:this.ROLES, sectorChips, skillGroups:groups,\n      submitStyle:`width:100%;font-size:14px;font-weight:600;color:#fff;border:none;border-radius:10px;padding:14px;background:${(d.name||'').trim()?'#1565C0':'#A9C4E4'};`,\n      onName:e=>this.patchDraft({name:e.target.value}),\n      onRole:e=>this.draftRole(e.target.value),\n      onYears:e=>this.patchDraft({years:e.target.value}),\n      onAvail:e=>this.patchDraft({avail:e.target.value}),\n      onBrands:e=>this.patchDraft({brands:e.target.value}),\n      onCerts:e=>this.patchDraft({certs:e.target.value}),\n      onBio:e=>this.patchDraft({bio:e.target.value}),\n      onSubmit:()=>this.submitDraft(), onEdit:()=>this.patchDraft({submitted:false}),\n      onCopy:(e)=>{ const inp=e&&e.currentTarget?e.currentTarget.previousElementSibling:null; this.copyText(d.link, inp); this.patchDraft({copied:true}); setTimeout(()=>{ if(this.state.onboardDraft) this.patchDraft({copied:false}); },1800); } };\n  }\n  buildReview(){\n    const d=this.state.reviewDraft;\n    if(!d) return { valid:false, invalid:true };\n    const skills=this.skillsFor(d.role).map(s=>{ const l=(d.skills&&d.skills[s.id])||'None'; const st=this.levelStyle(l);\n      return { name:s.full, level:l, badge:`display:inline-flex;align-items:center;justify-content:center;min-width:74px;height:22px;border-radius:6px;font-size:9.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;background:${st.bg};color:${st.fg};` }; });\n    return { valid:true, invalid:false, name:d.name, role:d.role,\n      meta:`${d.years||0} yrs · ${(d.sector||[]).join(', ')||'No sectors listed'} · ${d.avail||0}h/week`,\n      hasBio:!!d.bio, bio:d.bio||'', brands:d.brands||[], hasBrands:(d.brands||[]).length>0,\n      certs:d.certs||[], hasCerts:(d.certs||[]).length>0, skills,\n      onAccept:()=>this.acceptReview(), onDiscard:()=>this.discardReview() };\n  }\n\n  buildExport(){\n    const S=this.state;\n    const typeTabs=[['person','Individual'],['team','Project team']].map(([k,l])=>({ label:l, onClick:()=>this.setState({exportType:k}),\n      style:`flex:1;font-size:12px;font-weight:600;border:none;border-radius:7px;padding:8px;${S.exportType===k?'background:#0B1829;color:#fff;':'background:#F1F4F7;color:#5B6B7A;'}` }));\n    let pickLabel, pickId, pickOptions, onPick, sheets=[];\n    if(S.exportType==='person'){\n      pickLabel='Consultant'; pickId=S.exportPersonId;\n      pickOptions=S.people.map(p=>({id:p.id,label:`${p.name} · ${p.role}`}));\n      onPick=e=>this.setState({exportPersonId:e.target.value});\n      const p=this.personById(S.exportPersonId)||S.people[0];\n      if(p) sheets=[this.sheetFor(p,'Individual profile')];\n    } else {\n      pickLabel='Project'; pickId=S.exportProjectId;\n      pickOptions=S.projects.map(p=>({id:p.id,label:`${p.client} · ${p.sector}`}));\n      onPick=e=>this.setState({exportProjectId:e.target.value});\n      const pr=S.projects.find(x=>x.id===S.exportProjectId)||S.projects[0];\n      if(pr){ sheets=this.ROLES.map(role=>{ const pid=pr.team[role]; return pid?this.sheetFor(this.personById(pid),`${pr.client} · ${role}`):null; }).filter(Boolean); }\n    }\n    return { typeTabs, pickLabel, pickId, pickOptions, onPick,\n      anonToggle:`width:42px;height:24px;border-radius:999px;border:none;position:relative;background:${S.anon?'#1565C0':'#CBD5E0'};`,\n      anonKnob:`position:absolute;top:3px;${S.anon?'left:21px':'left:3px'};width:18px;height:18px;border-radius:50%;background:#fff;transition:left .15s;`,\n      onToggleAnon:()=>this.setState({anon:!S.anon}), onPrint:()=>window.print(), sheets };\n  }\n  sheetFor(p, context){\n    const anon=this.state.anon;\n    const skills=this.skillsFor(p.role).filter(s=>this.levelIdx(p.skills[s.id]||'None')>=1)\n      .sort((a,b)=>this.levelIdx(p.skills[b.id])-this.levelIdx(p.skills[a.id]))\n      .map(s=>{ const l=p.skills[s.id]; const st=this.levelStyle(l);\n        return { name:s.full, level:l, badge:`display:inline-flex;align-items:center;justify-content:center;min-width:62px;height:20px;border-radius:5px;font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;background:${st.bg};color:${st.fg};` }; });\n    return { context, name: anon ? p.role : p.name,\n      role: anon ? `${p.sector[0]||'Cross-sector'} specialist · ${p.years} yrs` : p.role,\n      stats:[ {value:`${p.years} yrs`, label:'Experience'}, {value:`${p.sector.length||1}`, label:'Sectors'}, {value:`${this.skillsFor(p.role).filter(s=>this.levelIdx(p.skills[s.id])>=2).length}`, label:'Proven skills'} ],\n      hasBio:!!p.bio, bio:p.bio, hasBrands:(p.brands||[]).length>0, brands:p.brands||[],\n      hasCerts:(p.certs||[]).length>0, certs:p.certs||[], skills };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
